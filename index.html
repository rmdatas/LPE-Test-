<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPE Electrical</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

<section class="min-h-screen flex flex-col justify-center items-center text-center px-6">
  <h1 class="text-6xl font-bold tracking-widest">LPE</h1>
  <p class="mt-2 tracking-[0.3em] text-sm text-gray-400">ELECTRICAL</p>
  <h2 class="mt-10 text-4xl font-semibold">Precision. Power. Trust.</h2>
  <p class="mt-6 max-w-xl text-gray-400">
    Premium electrical solutions for residential and commercial projects across Melbourne.
  </p>
  <div class="mt-8 flex gap-4">
    <a href="#contact" class="bg-white text-black px-6 py-3 text-sm uppercase">Get a Quote</a>
    <a href="#services" class="border border-white px-6 py-3 text-sm uppercase">Services</a>
  </div>
</section>

<section id="services" class="py-20 px-6 text-center">
  <h2 class="text-3xl font-semibold">Services</h2>
  <div class="mt-10 grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">
    <div class="border border-white/10 p-6">Residential</div>
    <div class="border border-white/10 p-6">Commercial</div>
    <div class="border border-white/10 p-6">Maintenance</div>
  </div>
</section>

<section id="contact" class="py-20 px-6 text-center">
  <h2 class="text-3xl font-semibold">Contact</h2>
  <p class="mt-4 text-gray-400">Ryan: 0421 882 484</p>
  <p class="text-gray-400">Luke: 0413 644 367</p>
</section>

</body>
</html>
